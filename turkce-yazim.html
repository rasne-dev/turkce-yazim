<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TürkçeYazım — Yazım Denetleyici</title>
<style>
  /* ── Tokens ── */
  :root {
    --crimson:  #B5202A;
    --crimson2: #8C1820;
    --ink:      #1A1A2E;
    --slate:    #4A4E69;
    --mist:     #F7F5F2;
    --white:    #FFFFFF;
    --border:   #E4E0DA;
    --err-red:  #C0392B;
    --err-ambe: #D97706;
    --err-blue: #2563EB;
    --err-red-bg:  rgba(192,57,43,0.07);
    --err-amb-bg:  rgba(217,119,6,0.08);
    --err-blu-bg:  rgba(37,99,235,0.07);
    --green:    #15803D;
    --shadow:   0 2px 16px rgba(0,0,0,0.09);
    --radius:   10px;
    --font:     'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--mist);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    background: var(--crimson);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 1rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    user-select: none;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    text-decoration: none;
  }

  .brand-seal {
    width: 36px; height: 36px;
    background: var(--white);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; font-weight: 900;
    color: var(--crimson);
    letter-spacing: -1px;
    flex-shrink: 0;
  }

  .brand-name {
    color: white;
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.01em;
  }

  .brand-tag {
    color: rgba(255,255,255,0.7);
    font-size: 0.7rem;
    margin-top: 3px;
    font-weight: 400;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .badge-tdk {
    background: rgba(255,255,255,0.18);
    color: white;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.25rem 0.6rem;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }

  /* ── Layout ── */
  .wrap {
    max-width: 1060px;
    margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
    width: 100%;
    flex: 1;
  }

  /* ── Loading ── */
  #stateLoading {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 3.5rem 2rem;
    text-align: center;
  }

  .spinner {
    width: 38px; height: 38px;
    border: 3px solid var(--border);
    border-top-color: var(--crimson);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin: 0 auto 1.25rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-title { font-weight: 700; font-size: 1rem; color: var(--ink); }
  .loading-sub { color: var(--slate); font-size: 0.83rem; margin-top: 0.35rem; }

  /* ── Input card ── */
  .input-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .input-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
  }

  .input-label {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--slate);
  }

  .sample-btn {
    font-size: 0.75rem;
    color: var(--crimson);
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font);
    font-weight: 600;
    padding: 0;
    opacity: 0.8;
  }
  .sample-btn:hover { opacity: 1; text-decoration: underline; }

  textarea {
    width: 100%;
    min-height: 160px;
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    font-size: 1rem;
    line-height: 1.75;
    font-family: var(--font);
    resize: vertical;
    color: var(--ink);
    transition: border-color 0.18s;
    background: var(--mist);
  }

  textarea:focus {
    outline: none;
    border-color: var(--crimson);
    background: var(--white);
  }

  textarea::placeholder { color: #B0A99F; }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }

  .btn {
    padding: 0.55rem 1.3rem;
    border: none;
    border-radius: 7px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    transition: background 0.15s, transform 0.1s, opacity 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary { background: var(--crimson); color: white; }
  .btn-primary:hover { background: var(--crimson2); }

  .btn-ghost {
    background: none;
    color: var(--slate);
    border: 1.5px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--slate); color: var(--ink); }

  .btn-sm {
    padding: 0.4rem 0.9rem;
    font-size: 0.8rem;
    border-radius: 6px;
  }

  .shortcut-hint {
    margin-left: auto;
    font-size: 0.75rem;
    color: var(--slate);
    opacity: 0.7;
  }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    align-items: center;
    gap: 1.25rem;
    background: var(--white);
    border-radius: var(--radius);
    padding: 0.75rem 1.25rem;
    box-shadow: var(--shadow);
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .stat { display: flex; align-items: center; gap: 0.45rem; font-size: 0.88rem; font-weight: 600; }
  .stat-dot { width: 9px; height: 9px; border-radius: 50%; }
  .s-spell { color: var(--err-red); }
  .s-spell .stat-dot { background: var(--err-red); }
  .s-punct { color: var(--err-ambe); }
  .s-punct .stat-dot { background: var(--err-ambe); }
  .s-sug { color: var(--err-blue); }
  .s-sug .stat-dot { background: var(--err-blue); }
  .stats-right { margin-left: auto; display: flex; gap: 0.5rem; align-items: center; }

  /* ── Results ── */
  .results-grid {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 1rem;
    align-items: start;
  }

  @media (max-width: 720px) { .results-grid { grid-template-columns: 1fr; } }

  /* ── Output card ── */
  .output-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 1.5rem;
  }

  .card-title {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--slate);
    padding-bottom: 0.85rem;
    margin-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  #outputText {
    font-size: 1rem;
    line-height: 1.85;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Highlights */
  .hi-spell {
    background: var(--err-red-bg);
    text-decoration: underline;
    text-decoration-style: wavy;
    text-decoration-color: var(--err-red);
    text-decoration-skip-ink: none;
    cursor: pointer;
    border-radius: 2px;
    padding: 0 1px;
  }
  .hi-spell:hover { background: rgba(192,57,43,0.14); }

  .hi-punct {
    background: var(--err-amb-bg);
    text-decoration: underline;
    text-decoration-style: wavy;
    text-decoration-color: var(--err-ambe);
    text-decoration-skip-ink: none;
    cursor: pointer;
    border-radius: 2px;
    padding: 0 1px;
  }
  .hi-punct:hover { background: rgba(217,119,6,0.15); }

  .hi-suggest {
    background: var(--err-blu-bg);
    text-decoration: underline;
    text-decoration-style: wavy;
    text-decoration-color: var(--err-blue);
    text-decoration-skip-ink: none;
    cursor: pointer;
    border-radius: 2px;
    padding: 0 1px;
  }
  .hi-suggest:hover { background: rgba(37,99,235,0.12); }

  /* ── Sidebar ── */
  .sidebar-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 1.25rem;
    max-height: 580px;
    overflow-y: auto;
    position: sticky;
    top: 1rem;
  }

  .sidebar-card::-webkit-scrollbar { width: 3px; }
  .sidebar-card::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .issue-item {
    border-radius: 7px;
    padding: 0.6rem 0.75rem;
    margin-bottom: 0.45rem;
    cursor: pointer;
    transition: opacity 0.15s, box-shadow 0.15s;
    border-left: 3px solid transparent;
  }
  .issue-item:hover { box-shadow: 0 1px 6px rgba(0,0,0,0.08); }

  .issue-item.spell { border-left-color: var(--err-red); background: var(--err-red-bg); }
  .issue-item.punct { border-left-color: var(--err-ambe); background: var(--err-amb-bg); }
  .issue-item.suggest { border-left-color: var(--err-blue); background: var(--err-blu-bg); }

  .issue-word {
    font-weight: 700;
    font-size: 0.88rem;
    margin-bottom: 0.15rem;
  }
  .issue-item.spell .issue-word { color: var(--err-red); }
  .issue-item.punct .issue-word { color: var(--err-ambe); }
  .issue-item.suggest .issue-word { color: var(--err-blue); }

  .issue-msg { font-size: 0.75rem; color: var(--slate); line-height: 1.35; }
  .issue-sug { font-size: 0.75rem; color: var(--green); margin-top: 0.25rem; font-weight: 600; }

  /* ── Success ── */
  .success-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 3rem 2rem;
    text-align: center;
  }
  .success-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
  .success-title { font-size: 1.1rem; font-weight: 700; color: var(--green); }
  .success-sub { color: var(--slate); font-size: 0.85rem; margin-top: 0.4rem; }

  /* ── Popup ── */
  #popup {
    position: fixed;
    background: var(--white);
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    padding: 1.1rem;
    width: 234px;
    z-index: 9999;
    border: 1px solid var(--border);
  }

  .pop-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.6rem;
  }

  .pop-badge {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
  }
  .pop-badge.spell { background: var(--err-red-bg); color: var(--err-red); }
  .pop-badge.punct { background: var(--err-amb-bg); color: var(--err-ambe); }
  .pop-badge.suggest { background: var(--err-blu-bg); color: var(--err-blue); }

  .pop-close {
    cursor: pointer;
    color: var(--slate);
    font-size: 1.15rem;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: background 0.12s;
  }
  .pop-close:hover { background: var(--mist); }

  .pop-word {
    font-size: 1.05rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
    color: var(--ink);
  }

  .pop-msg {
    font-size: 0.78rem;
    color: var(--slate);
    line-height: 1.4;
    margin-bottom: 0.75rem;
  }

  .pop-sugs-label {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--slate);
    margin-bottom: 0.35rem;
  }

  .sug-btn {
    display: block;
    width: 100%;
    text-align: left;
    padding: 0.4rem 0.6rem;
    border: none;
    border-radius: 6px;
    background: none;
    font-size: 0.88rem;
    cursor: pointer;
    color: var(--ink);
    font-family: var(--font);
    transition: background 0.12s;
    font-weight: 500;
  }
  .sug-btn:hover { background: var(--mist); color: var(--crimson); font-weight: 700; }

  .pop-footer {
    margin-top: 0.75rem;
    padding-top: 0.65rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 0.5rem;
  }

  .pop-action {
    font-size: 0.73rem;
    color: var(--slate);
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font);
    padding: 0;
    line-height: 1;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .pop-action:hover { color: var(--ink); }

  /* Utility */
  [style*="display:none"] { display: none !important; }
</style>
</head>
<body>

<header class="header">
  <div class="brand">
    <div class="brand-seal">Tü</div>
    <div>
      <div class="brand-name">TürkçeYazım</div>
      <div class="brand-tag">Türkçe Yazım Denetleyici</div>
    </div>
  </div>
  <div class="header-right">
    <span class="badge-tdk">TDK Uyumlu</span>
  </div>
</header>

<div class="wrap">

  <!-- Loading -->
  <div id="stateLoading">
    <div class="spinner"></div>
    <div class="loading-title">Türkçe sözlük yükleniyor…</div>
    <div class="loading-sub">Bu birkaç saniye sürebilir.</div>
  </div>

  <!-- Main app (after dict loads) -->
  <div id="stateApp" style="display:none">

    <!-- Input -->
    <div class="input-card">
      <div class="input-header">
        <span class="input-label">Denetlenecek metin</span>
        <button class="sample-btn" id="sampleBtn">Örnek metin yükle →</button>
      </div>
      <textarea id="inputText" placeholder="Kontrol etmek istediğiniz Türkçe metni buraya yazın veya yapıştırın…&#10;&#10;Kısayol: Ctrl + Enter → Kontrol et"></textarea>
      <div class="toolbar">
        <button class="btn btn-primary" id="checkBtn">✓ Kontrol Et</button>
        <button class="btn btn-ghost" id="clearBtn">✕ Temizle</button>
        <span id="charCount" style="font-size:0.78rem;color:var(--slate);opacity:0.7;margin-left:0.25rem;">0 karakter</span>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-bar" id="statsBar" style="display:none">
      <div class="stat s-spell"><div class="stat-dot"></div><span id="cntSpell">0</span> yazım hatası</div>
      <div class="stat s-punct"><div class="stat-dot"></div><span id="cntPunct">0</span> noktalama</div>
      <div class="stat s-sug"><div class="stat-dot"></div><span id="cntSug">0</span> öneri</div>
      <div class="stats-right">
        <button class="btn btn-ghost btn-sm" id="fixAllBtn">⚡ Tümünü Düzelt</button>
        <button class="btn btn-ghost btn-sm" id="copyBtn">⎘ Kopyala</button>
      </div>
    </div>

    <!-- Results -->
    <div id="resultsArea" style="display:none"></div>

  </div>
</div>

<!-- Popup -->
<div id="popup" style="display:none">
  <div class="pop-header">
    <span class="pop-badge" id="popBadge">Yazım Hatası</span>
    <span class="pop-close" id="popClose">×</span>
  </div>
  <div class="pop-word" id="popWord"></div>
  <div class="pop-msg" id="popMsg"></div>
  <div id="popSugs"></div>
  <div class="pop-footer" id="popFooter"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/typo-js@1.2.4/typo.js"></script>
<script>
(function () {
  'use strict';

  // ── Turkish helpers ──────────────────────────────────────────
  function trLow(s) {
    return s.replace(/İ/g, 'i').replace(/I/g, 'ı').toLowerCase();
  }
  function trUp1(s) {
    if (!s) return s;
    const c = s[0];
    const u = c === 'i' ? 'İ' : c === 'ı' ? 'I' : c.toUpperCase();
    return u + s.slice(1);
  }
  function isTRWord(c) {
    return /[a-zA-ZığüşöçİĞÜŞÖÇ'-]/.test(c);
  }
  function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ── Common mistakes (TDK'ya göre) ───────────────────────────
  const COMMON = {
    'birşey':         'bir şey',
    'birşeyi':        'bir şeyi',
    'birşeyler':      'bir şeyler',
    'birşeyleri':     'bir şeyleri',
    'herşey':         'her şey',
    'herşeyi':        'her şeyi',
    'herşeyleri':     'her şeyleri',
    'hiçbirşey':      'hiçbir şey',
    'hiçbirşeyi':     'hiçbir şeyi',
    'herkez':         'herkes',
    'herkezin':       'herkesin',
    'herkezi':        'herkesi',
    'değilmi':        'değil mi',
    'tamammı':        'tamam mı',
    'nasılki':        'nasıl ki',
    'bişey':          'bir şey',
    'bişeyi':         'bir şeyi',
    'napalım':        'ne yapalım',
    'napıyorsun':     'ne yapıyorsun',
    'napıyorum':      'ne yapıyorum',
    'napacaksın':     'ne yapacaksın',
    'naparsın':       'ne yaparsın',
    'naptın':         'ne yaptın',
    'niye':           'niye',      // doğru ama sık yanlış yazılır – atla
    'sanki':          'sanki',     // doğru – atla
    'hicbir':         'hiçbir',
    'hicbirsey':      'hiçbir şey',
    'gercekten':      'gerçekten',
    'icinizin':       'içinizin',
    'oncelikle':      'öncelikle',
    'su an':          'şu an',
    'su anda':        'şu anda',
    'bu gun':         'bugün',
    'bu gün':         'bugün',
    'bu yil':         'bu yıl',
  };
  // sadece yanlış olanları tut
  const REAL_COMMON = Object.fromEntries(
    Object.entries(COMMON).filter(([k, v]) => k !== v)
  );

  // ── State ────────────────────────────────────────────────────
  let dict = null;
  let currentText  = '';
  let currentIssues = [];
  const ignored = new Set();

  // ── Dictionary ───────────────────────────────────────────────
  async function loadDict() {
    const base = 'https://cdn.jsdelivr.net/npm/dictionary-tr';
    const [ra, rd] = await Promise.all([
      fetch(base + '/index.aff'),
      fetch(base + '/index.dic'),
    ]);
    if (!ra.ok || !rd.ok) throw new Error('Sözlük dosyaları indirilemedi.');
    const [aff, dic] = await Promise.all([ra.text(), rd.text()]);
    dict = new Typo('tr_TR', aff, dic, { platform: 'any' });
  }

  // ── Spell helpers ────────────────────────────────────────────
  function ok(word) {
    if (word.length < 2) return true;
    if (/^\d+$/.test(word)) return true;
    if (ignored.has(trLow(word))) return true;
    if (dict.check(word)) return true;
    const lo = trLow(word);
    if (dict.check(lo)) return true;
    const noApos = word.replace(/^'+|'+$/g, '');
    if (noApos !== word && (dict.check(noApos) || dict.check(trLow(noApos)))) return true;
    return false;
  }

  function suggest(word) {
    let s = dict.suggest(word) || [];
    if (!s.length) s = dict.suggest(trLow(word)) || [];
    return s.slice(0, 6);
  }

  // ── Analysis ─────────────────────────────────────────────────
  function analyze(text) {
    const issues = [];
    const ranges = [];

    function overlap(s, e) {
      return ranges.some(r => s < r[1] && e > r[0]);
    }

    function push(iss) {
      if (!overlap(iss.start, iss.end)) {
        issues.push(iss);
        ranges.push([iss.start, iss.end]);
      }
    }

    // 1. Common mistakes
    for (const [wrong, right] of Object.entries(REAL_COMMON)) {
      const rx = new RegExp(wrong, 'gi');
      let m;
      while ((m = rx.exec(text)) !== null) {
        const pre  = m.index > 0 ? text[m.index - 1] : ' ';
        const post = m.index + m[0].length < text.length ? text[m.index + m[0].length] : ' ';
        if (!isTRWord(pre) && !isTRWord(post)) {
          push({
            type: 'spell', sub: 'common',
            word: m[0], start: m.index, end: m.index + m[0].length,
            suggestions: [right],
            msg: `"${wrong}" yerine "${right}" yazılmalıdır (TDK)`
          });
        }
      }
    }

    // 2. Spell check word by word
    const wordRx = /[a-zA-ZığüşöçİĞÜŞÖÇ][a-zA-ZığüşöçİĞÜŞÖÇ'-]*/g;
    let m;
    while ((m = wordRx.exec(text)) !== null) {
      const w = m[0], s = m.index, e = s + w.length;
      if (overlap(s, e)) continue;
      if (ignored.has(trLow(w))) continue;
      if (w.length < 2) continue;
      if (!ok(w)) {
        const sugs = suggest(w);
        push({
          type: 'spell', sub: 'typo',
          word: w, start: s, end: e,
          suggestions: sugs,
          msg: `"${w}" kelimesi Türkçe sözlükte bulunamadı`
        });
      }
    }

    // 3. Noktalama: virgülden sonra boşluk yok
    const rx1 = /,(?=[^ \n\r"'»)\]0-9.,;!?])/g;
    while ((m = rx1.exec(text)) !== null) {
      push({ type: 'punct', word: ',', start: m.index, end: m.index + 1,
        suggestions: [', '], msg: 'Virgülden sonra boşluk bırakılmalıdır (TDK)' });
    }

    // 4. Noktadan sonra boşluk yok
    const rx2 = /\.(?=[A-ZİĞÜŞÖÇa-zığüşöç])/g;
    while ((m = rx2.exec(text)) !== null) {
      if (overlap(m.index, m.index + 1)) continue;
      push({ type: 'punct', word: '.', start: m.index, end: m.index + 1,
        suggestions: ['. '], msg: 'Noktadan sonra boşluk bırakılmalıdır' });
    }

    // 5. Soru işaretinden sonra boşluk yok
    const rx3 = /\?(?=[A-ZİĞÜŞÖÇa-zığüşöç])/g;
    while ((m = rx3.exec(text)) !== null) {
      if (overlap(m.index, m.index + 1)) continue;
      push({ type: 'punct', word: '?', start: m.index, end: m.index + 1,
        suggestions: ['? '], msg: 'Soru işaretinden sonra boşluk bırakılmalıdır' });
    }

    // 6. Noktalama işaretinden önce boşluk
    const rx4 = /[ \t]+([,;:.!?])/g;
    while ((m = rx4.exec(text)) !== null) {
      if (overlap(m.index, m.index + m[0].length)) continue;
      push({ type: 'punct', word: m[0], start: m.index, end: m.index + m[0].length,
        suggestions: [m[1]], msg: 'Noktalama işaretinden önce boşluk olmamalıdır (TDK)' });
    }

    // 7. Çift boşluk
    const rx5 = /[ \t]{2,}/g;
    while ((m = rx5.exec(text)) !== null) {
      if (overlap(m.index, m.index + m[0].length)) continue;
      push({ type: 'punct', word: m[0], start: m.index, end: m.index + m[0].length,
        suggestions: [' '], msg: 'Gereksiz fazla boşluk kullanılmış' });
    }

    // 8. Üç nokta → … (elipsis)
    const rx6 = /\.{3}/g;
    while ((m = rx6.exec(text)) !== null) {
      if (overlap(m.index, m.index + 3)) continue;
      push({ type: 'suggest', word: '...', start: m.index, end: m.index + 3,
        suggestions: ['…'], msg: 'Üç nokta yerine elipsis karakteri (…) kullanılabilir' });
    }

    // 9. Cümle başı büyük harf (manuel iterasyon)
    let sentStart = true;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (sentStart && /[a-zığüşöç]/.test(c)) {
        const upper = trUp1(c);
        if (upper !== c && !overlap(i, i + 1)) {
          push({ type: 'suggest', word: c, start: i, end: i + 1,
            suggestions: [upper], msg: 'Cümle başında büyük harf kullanılmalıdır (TDK)' });
        }
        sentStart = false;
      } else if (/[.!?]/.test(c)) {
        sentStart = true;
      } else if (!/\s/.test(c)) {
        sentStart = false;
      }
    }

    // 10. Kesme işareti eksik kontrolü (özel isim + ek)
    // Büyük harfle başlayan ve ek almış görünen kelimeler
    const rx7 = /([A-ZİĞÜŞÖÇ][a-zA-ZığüşöçİĞÜŞÖÇ]+)([a-zığüşöç]{1,3})\b/g;
    const trSuffixes = ['da','de','ta','te','dan','den','tan','ten','la','le','ya','ye','na','ne','nın','nin','nun','nün','ın','in','un','ün','ı','i','u','ü','a','e','lar','ler','lara','lere'];
    while ((m = rx7.exec(text)) !== null) {
      // Zaten kesme işareti varsa atla
      const before = m.index > 0 ? text[m.index - 1] : '';
      if (before === "'" || before === ''') continue;
      // Pref sonunda bir Türkçe eki var mı?
      const stem = m[1], suf = m[2];
      if (trSuffixes.some(s => s === trLow(suf)) && stem.length > 2) {
        if (overlap(m.index, m.index + m[0].length)) continue;
        const fixed = stem + "'" + suf;
        push({
          type: 'suggest', word: m[0], start: m.index, end: m.index + m[0].length,
          suggestions: [fixed],
          msg: `Özel isim ile ek arasına kesme işareti konulmalıdır (TDK): "${fixed}"`
        });
      }
    }

    issues.sort((a, b) => a.start - b.start);
    return issues;
  }

  // ── Rendering ────────────────────────────────────────────────
  function renderOutput(text, issues) {
    let html = '', pos = 0;
    for (let i = 0; i < issues.length; i++) {
      const iss = issues[i];
      html += esc(text.slice(pos, iss.start)).replace(/\n/g, '<br>');
      const cls = iss.type === 'spell' ? 'hi-spell' :
                  iss.type === 'suggest' ? 'hi-suggest' : 'hi-punct';
      html += `<span class="${cls}" data-i="${i}" onclick="TYAZ.popup(event,${i})">${esc(iss.word) || '&nbsp;&nbsp;'}</span>`;
      pos = iss.end;
    }
    html += esc(text.slice(pos)).replace(/\n/g, '<br>');
    return html;
  }

  function renderSidebar(issues) {
    if (!issues.length) return '';
    return issues.map((iss, i) => {
      const wordLabel = iss.word.trim() || '(boşluk)';
      const sugLabel  = iss.suggestions[0] ? `→ ${esc(iss.suggestions[0])}` : '';
      return `
        <div class="issue-item ${iss.type}" onclick="TYAZ.popup(null,${i})">
          <div class="issue-word">${esc(wordLabel)}</div>
          <div class="issue-msg">${esc(iss.msg)}</div>
          ${sugLabel ? `<div class="issue-sug">${sugLabel}</div>` : ''}
        </div>`;
    }).join('');
  }

  function renderResults(issues) {
    if (!issues.length) {
      return `<div class="success-card">
        <div class="success-icon">✅</div>
        <div class="success-title">Harika! Hata bulunamadı.</div>
        <div class="success-sub">Metninizde yazım veya noktalama sorunu tespit edilmedi.</div>
      </div>`;
    }
    return `
      <div class="results-grid">
        <div class="output-card">
          <div class="card-title">Denetlenen Metin</div>
          <div id="outputText">${renderOutput(currentText, issues)}</div>
        </div>
        <div class="sidebar-card">
          <div class="card-title">Hatalar &amp; Öneriler (${issues.length})</div>
          <div id="issueList">${renderSidebar(issues)}</div>
        </div>
      </div>`;
  }

  // ── Popup ────────────────────────────────────────────────────
  window.TYAZ = {
    popup(event, idx) {
      if (event) event.stopPropagation();
      const iss = currentIssues[idx];
      if (!iss) return;

      const typeLabel = iss.type === 'spell'   ? 'Yazım Hatası' :
                        iss.type === 'suggest'  ? 'Öneri'        : 'Noktalama';

      const popBadge = document.getElementById('popBadge');
      popBadge.textContent = typeLabel;
      popBadge.className   = `pop-badge ${iss.type}`;

      document.getElementById('popWord').textContent = iss.word.trim() || '(boşluk)';
      document.getElementById('popMsg').textContent  = iss.msg;

      const sugsEl = document.getElementById('popSugs');
      if (iss.suggestions.length) {
        sugsEl.innerHTML = `<div class="pop-sugs-label">Öneriler</div>` +
          iss.suggestions.map(s =>
            `<button class="sug-btn" onclick="TYAZ.fix(${idx},${JSON.stringify(s)})">${esc(s)}</button>`
          ).join('');
      } else {
        sugsEl.innerHTML = `<div style="font-size:0.78rem;color:var(--slate);font-style:italic;margin-bottom:0.5rem;">Öneri bulunamadı</div>`;
      }

      const footer = document.getElementById('popFooter');
      footer.innerHTML = '';
      if (iss.type === 'spell') {
        const b = document.createElement('button');
        b.className = 'pop-action';
        b.textContent = 'Bu kelimeyi yoksay';
        b.onclick = () => TYAZ.ignore(iss.word);
        footer.appendChild(b);
      }

      const pop = document.getElementById('popup');
      pop.style.display = 'block';
      pop.style.transform = '';

      if (event) {
        let x = event.clientX + 8;
        let y = event.clientY + 12;
        if (x + 240 > window.innerWidth)  x = event.clientX - 248;
        if (y + 280 > window.innerHeight) y = event.clientY - 290;
        pop.style.left = Math.max(4, x) + 'px';
        pop.style.top  = Math.max(4, y) + 'px';
      } else {
        pop.style.left = '50%';
        pop.style.top  = '40%';
        pop.style.transform = 'translate(-50%,-50%)';
      }
    },

    fix(idx, suggestion) {
      const iss = currentIssues[idx];
      if (!iss) return;
      currentText = currentText.slice(0, iss.start) + suggestion + currentText.slice(iss.end);
      document.getElementById('inputText').value = currentText;
      closePopup();
      run();
    },

    ignore(word) {
      ignored.add(trLow(word));
      closePopup();
      run();
    }
  };

  function closePopup() {
    document.getElementById('popup').style.display = 'none';
  }

  // ── Run ──────────────────────────────────────────────────────
  function run() {
    currentText   = document.getElementById('inputText').value;
    if (!currentText.trim()) return;

    currentIssues = analyze(currentText);

    const cSpell = currentIssues.filter(i => i.type === 'spell').length;
    const cPunct = currentIssues.filter(i => i.type === 'punct').length;
    const cSug   = currentIssues.filter(i => i.type === 'suggest').length;

    document.getElementById('cntSpell').textContent = cSpell;
    document.getElementById('cntPunct').textContent = cPunct;
    document.getElementById('cntSug').textContent   = cSug;
    document.getElementById('statsBar').style.display = 'flex';

    const ra = document.getElementById('resultsArea');
    ra.style.display = 'block';
    ra.innerHTML = renderResults(currentIssues);
  }

  // ── Fix all (only safe: common mistakes + punctuation with 1 suggestion) ──
  function fixAll() {
    const safeTypes = ['common', 'punct'];
    // Apply in reverse order so positions stay valid
    const safe = currentIssues
      .filter(i => (i.sub === 'common' || i.type === 'punct') && i.suggestions.length === 1)
      .sort((a, b) => b.start - a.start);

    let text = currentText;
    for (const iss of safe) {
      text = text.slice(0, iss.start) + iss.suggestions[0] + text.slice(iss.end);
    }
    currentText = text;
    document.getElementById('inputText').value = text;
    ignored.clear();
    run();
  }

  // ── Events ───────────────────────────────────────────────────
  document.getElementById('checkBtn').addEventListener('click', run);

  document.getElementById('clearBtn').addEventListener('click', () => {
    document.getElementById('inputText').value = '';
    document.getElementById('statsBar').style.display  = 'none';
    document.getElementById('resultsArea').style.display = 'none';
    document.getElementById('charCount').textContent = '0 karakter';
    currentText = ''; currentIssues = [];
    ignored.clear();
    closePopup();
  });

  document.getElementById('inputText').addEventListener('input', () => {
    const n = document.getElementById('inputText').value.length;
    document.getElementById('charCount').textContent = n.toLocaleString('tr-TR') + ' karakter';
  });

  document.getElementById('inputText').addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); run(); }
  });

  document.getElementById('fixAllBtn').addEventListener('click', fixAll);

  document.getElementById('copyBtn').addEventListener('click', () => {
    const txt = document.getElementById('inputText').value;
    navigator.clipboard.writeText(txt).then(() => {
      const b = document.getElementById('copyBtn');
      b.textContent = '✓ Kopyalandı!';
      setTimeout(() => b.textContent = '⎘ Kopyala', 2000);
    });
  });

  document.getElementById('popClose').addEventListener('click', closePopup);

  document.addEventListener('click', e => {
    const pop = document.getElementById('popup');
    if (pop.style.display === 'none') return;
    if (!pop.contains(e.target) &&
        !e.target.closest('.hi-spell,.hi-punct,.hi-suggest,.issue-item')) {
      closePopup();
    }
  });

  // Sample text
  document.getElementById('sampleBtn').addEventListener('click', () => {
    document.getElementById('inputText').value =
      'bu metin bir örnek metindir.türkçe yazım kuralları çok önemlidir.\n' +
      'birşey yapmadan önce ,düşünmek gerekir.Cümle başları büyük harfle başlamalı.\n' +
      'Türkiyede yaşayan insanlar bu konuya dikkat etmelidir.\n' +
      'Ayrıca  çift boşluk ve noktalama işaretlerinden önce boşluk bırakmamak gerekir !';
    document.getElementById('charCount').textContent =
      document.getElementById('inputText').value.length.toLocaleString('tr-TR') + ' karakter';
  });

  // ── Init ─────────────────────────────────────────────────────
  loadDict()
    .then(() => {
      document.getElementById('stateLoading').style.display = 'none';
      document.getElementById('stateApp').style.display     = 'block';
      document.getElementById('inputText').focus();
    })
    .catch(err => {
      document.getElementById('stateLoading').innerHTML = `
        <div style="font-size:2rem;margin-bottom:0.75rem;">⚠️</div>
        <div class="loading-title" style="color:var(--err-red)">Sözlük yüklenemedi</div>
        <div class="loading-sub" style="margin-top:0.4rem;">${err.message}</div>
        <button class="btn btn-primary" onclick="location.reload()" style="margin-top:1.25rem;">
          Yeniden Dene
        </button>`;
    });

})();
</script>
</body>
</html>
